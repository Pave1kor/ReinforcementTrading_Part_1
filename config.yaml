# config.yaml
data:
  path: "data/SBER_2018_2025.csv"
  test_path: "data/SBER_test_2023_daily.csv"
  window_size: 60
  pip_value: 0.01

environment:
  spread_pips: 0.0
  max_slippage_pips: 0.0
  risk_per_trade: 0.01
  leverage: 1.0
  commission_percent: 0.0006      # 0.05%
  
  # Динамический стоп-лосс на основе ATR
  use_atr_sl: true
  atr_multiplier_sl: 2.0          # k для стопа
  atr_multiplier_tp: [3.0, 5.0, 7.0, 9.0, 12.0]  # для разных множителей лота
  
  # Частичное закрытие
  partial_close_enabled: false
  partial_close_ratio: 0.5        # закрывать 50% позиции при первом TP
  tp_levels: [0.5, 1.0]           # доли от основного TP для частичного закрытия
  
  reward:
    reward_scale: 1.0
    slope_div_reward_scale: 0.0
    open_penalty_pips: 0.0
    time_penalty_pips: 0.0
  
  # Фиксированные параметры (если atr_sl выключен)
  fixed_sl_percent: 0.02
  fixed_tp_percents: [0.02, 0.04, 0.06, 0.08, 0.10]

training:
  total_timesteps: 2_000_000
  num_envs: 8
  episode_max_steps: 800
  min_episode_steps: 300
  
  # Purged Walk-Forward
  purge_days: 5                    # дни отступа между train и val
  val_years: [2019, 2020, 2021, 2022]  # годы для валидации
  
  # PPO hyperparameters
  learning_rate: 1e-4
  n_steps: 2048
  batch_size: 256
  n_epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.02
  vf_coef: 0.3
  max_grad_norm: 0.7
  
  policy:
    net_arch_shared: [128]
    net_arch_pi: [64]
    net_arch_vf: [32]
    lstm_hidden_size: 48
    n_lstm_layers: 1

testing:
  deterministic: true
  save_trades: true